trigger:
  - main
  - develop

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'
  projectPath: '**/TMCryptoCore.csproj'
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

stages:
  - stage: Analyze
    displayName: 'Code Analysis & Security Scan'
    jobs:
      - job: SecurityScanning
        displayName: 'Security & Code Quality Analysis'
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET 8'
            inputs:
              packageType: 'sdk'
              version: $(dotnetVersion)
              includePreviewVersions: false

          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(projectPath)'

          - task: DotNetCoreCLI@2
            displayName: 'Run Roslyn analyzers'
            inputs:
              command: 'build'
              projects: '$(projectPath)'
              arguments: '/p:EnforceCodeStyleInBuild=true'
            continueOnError: true

          - task: UseDotNet@2
            displayName: 'Install Security Scanner (Trivy)'
            inputs:
              packageType: 'runtime'
              version: '6.0.x'
            continueOnError: true

          - task: NuGetToolInstaller@1
            displayName: 'Install NuGet'

  - stage: Build
    displayName: 'Build and Test'
    dependsOn: Analyze
    condition: succeeded()
    jobs:
      - job: BuildJob
        displayName: 'Build Solution'
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET 8'
            inputs:
              packageType: 'sdk'
              version: $(dotnetVersion)
              includePreviewVersions: false

          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(projectPath)'

          - task: DotNetCoreCLI@2
            displayName: 'Build solution'
            inputs:
              command: 'build'
              projects: '$(projectPath)'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run unit tests with code coverage'
            inputs:
              command: 'test'
              projects: '$(projectPath)'
              arguments: '--configuration $(buildConfiguration) --no-build --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=$(Build.ArtifactStagingDirectory)/coverage/'
            continueOnError: true

          - task: reportgenerator@5
            displayName: 'Generate code coverage report'
            inputs:
              reports: '$(Build.ArtifactStagingDirectory)/coverage/coverage.cobertura.xml'
              targetdir: '$(Build.ArtifactStagingDirectory)/coverage'
              reporttypes: 'HtmlInline_AzurePipelines'
            continueOnError: true

          - task: PublishCodeCoverageResults@1
            displayName: 'Publish code coverage'
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(Build.ArtifactStagingDirectory)/coverage/coverage.cobertura.xml'
            continueOnError: true

          - task: DotNetCoreCLI@2
            displayName: 'Publish application'
            inputs:
              command: 'publish'
              projects: '$(projectPath)'
              publishWebProjects: false
              arguments: '--configuration $(buildConfiguration) --no-build -o $(Build.ArtifactStagingDirectory)/publish'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish build artifacts'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'drop'
              publishLocation: 'Container'

  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevelopment
        displayName: 'Deploy to Dev Environment'
        environment: 'development'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'drop'
                    downloadPath: '$(Pipeline.Workspace)'

                - task: AzureRmWebAppDeployment@4
                  displayName: 'Deploy to Dev App Service'
                  inputs:
                    ConnectedServiceName: '$(azureSubscriptionEndpoint)'
                    appType: 'webApp'
                    WebAppName: '$(appServiceNameDev)'
                    RuntimeStack: 'DOTNETCORE|8.0'
                    StartupCommand: 'dotnet TMCryptoCore.dll'
                    Package: '$(Pipeline.Workspace)/drop/publish/*.zip'
                    DeploymentMethod: 'auto'

  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy to Staging Environment'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'drop'
                    downloadPath: '$(Pipeline.Workspace)'

                - task: AzureRmWebAppDeployment@4
                  displayName: 'Deploy to Staging App Service'
                  inputs:
                    ConnectedServiceName: '$(azureSubscriptionEndpoint)'
                    appType: 'webApp'
                    WebAppName: '$(appServiceNameStaging)'
                    RuntimeStack: 'DOTNETCORE|8.0'
                    StartupCommand: 'dotnet TMCryptoCore.dll'
                    Package: '$(Pipeline.Workspace)/drop/publish/*.zip'
                    DeploymentMethod: 'auto'

  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to Production Environment'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'drop'
                    downloadPath: '$(Pipeline.Workspace)'

                - task: AzureRmWebAppDeployment@4
                  displayName: 'Deploy to Production App Service'
                  inputs:
                    ConnectedServiceName: '$(azureSubscriptionEndpoint)'
                    appType: 'webApp'
                    WebAppName: '$(appServiceNameProd)'
                    RuntimeStack: 'DOTNETCORE|8.0'
                    StartupCommand: 'dotnet TMCryptoCore.dll'
                    Package: '$(Pipeline.Workspace)/drop/publish/*.zip'
                    DeploymentMethod: 'auto'
